<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello Park — Менеджер</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#0F0F12;color:#E4E4E7;min-height:100vh}
    .header{background:#18181B;border-bottom:1px solid #27272A;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .header-left{display:flex;align-items:center;gap:12px}
    .logo{width:36px;height:36px;background:linear-gradient(135deg,#FF6022,#FF8A50);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
    .header-title{font-size:18px;font-weight:700;color:#FAFAFA}
    .dot-live{width:8px;height:8px;border-radius:50%;background:#22C55E;animation:pulse 2s infinite;display:inline-block;margin-right:6px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:20px 24px}
    .stat-card{background:#18181B;border:1px solid #27272A;border-radius:12px;padding:16px}
    .stat-label{font-size:11px;color:#71717A;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .stat-value{font-size:28px;font-weight:800;color:#FAFAFA}
    .stat-value.orange{color:#FF6022}.stat-value.green{color:#22C55E}.stat-value.blue{color:#3B82F6}
    .filters{padding:0 24px 16px;display:flex;gap:8px;flex-wrap:wrap}
    .filter-btn{padding:8px 16px;border-radius:20px;border:1px solid #27272A;background:#18181B;color:#A1A1AA;font-size:13px;cursor:pointer;font-family:inherit}
    .filter-btn:hover{border-color:#3F3F46;color:#E4E4E7}
    .filter-btn.active{background:#FF6022;border-color:#FF6022;color:#fff;font-weight:600}
    .filter-count{display:inline-flex;min-width:18px;height:18px;border-radius:9px;background:rgba(255,255,255,.2);font-size:11px;margin-left:6px;padding:0 5px;align-items:center;justify-content:center}
    .table-wrap{padding:0 24px 24px;overflow-x:auto}
    table{width:100%;border-collapse:collapse;background:#18181B;border-radius:12px;overflow:hidden;border:1px solid #27272A}
    th{text-align:left;padding:12px 16px;font-size:11px;color:#71717A;text-transform:uppercase;letter-spacing:.5px;background:#1C1C1F;border-bottom:1px solid #27272A;font-weight:600;white-space:nowrap}
    td{padding:14px 16px;font-size:14px;border-bottom:1px solid #1F1F23;vertical-align:middle}
    tr:last-child td{border-bottom:none}tr:hover td{background:#1C1C20}tr{cursor:pointer}
    .status-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500;white-space:nowrap}
    .status-dot{width:6px;height:6px;border-radius:50%}
    .status-new{background:#1E293B;color:#60A5FA}.status-new .status-dot{background:#3B82F6}
    .status-submitted{background:#14241A;color:#4ADE80}.status-submitted .status-dot{background:#22C55E}
    .status-configuring{background:#1C1917;color:#FCD34D}.status-configuring .status-dot{background:#F59E0B}
    .status-link_sent{background:#1E1B2E;color:#C084FC}.status-link_sent .status-dot{background:#A855F7}
    .status-bot_connected{background:#1A2332;color:#67E8F9}.status-bot_connected .status-dot{background:#22D3EE}
    .status-contacted{background:#1A1A2E;color:#818CF8}.status-contacted .status-dot{background:#6366F1}
    .status-confirmed{background:#0F2318;color:#34D399}.status-confirmed .status-dot{background:#10B981}
    .phone-link{color:#A1A1AA;text-decoration:none}.phone-link:hover{color:#FF6022}
    .lead-name{font-weight:600;color:#FAFAFA}
    .time-ago{color:#71717A;font-size:12px}
    .total-price{font-size:20px;font-weight:800;background:linear-gradient(135deg,#FF6022,#FF8A50);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.active{display:flex}
    .modal{background:#18181B;border:1px solid #27272A;border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto}
    .modal-header{padding:20px 24px;border-bottom:1px solid #27272A;display:flex;align-items:center;justify-content:space-between}
    .modal-title{font-size:18px;font-weight:700;color:#FAFAFA}
    .modal-close{width:32px;height:32px;border-radius:8px;border:1px solid #27272A;background:#1C1C1F;color:#A1A1AA;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
    .modal-close:hover{background:#27272A;color:#FAFAFA}
    .modal-body{padding:24px}
    .detail-label{font-size:11px;color:#71717A;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
    .config-item{background:#1C1C1F;border-radius:8px;padding:12px;border:1px solid #27272A}
    .config-item-label{font-size:11px;color:#71717A;margin-bottom:4px}
    .config-item-value{font-size:14px;color:#FAFAFA;font-weight:500}
    .action-row{display:flex;gap:8px;padding:16px 24px;border-top:1px solid #27272A}
    .btn{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
    .btn-primary{background:linear-gradient(135deg,#FF6022,#FF8A50);color:#fff}
    .btn-secondary{background:#27272A;color:#E4E4E7}
    .btn-success{background:#16A34A;color:#fff}
    .chat-section {
      border-top: 1px solid #27272A;
      margin-top: 20px;
      padding-top: 20px;
    }
    .chat-messages {
      height: 200px;
      overflow-y: auto;
      background: #0F0F12;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .msg {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
    }
    .msg-client { background: #27272A; align-self: flex-start; color: #E4E4E7; }
    .msg-manager { background: #FF6022; align-self: flex-end; color: #fff; }
    .msg-time { font-size: 10px; opacity: 0.5; margin-top: 4px; display: block; }
    .chat-input-wrap { display: flex; gap: 8px; }
    .chat-input {
      flex: 1; background: #1C1C1F; border: 1px solid #27272A;
      border-radius: 8px; padding: 8px 12px; color: #fff; font-family: inherit;
    }

    textarea.notes-input{width:100%;background:#1C1C1F;border:1px solid #27272A;border-radius:8px;padding:12px;color:#E4E4E7;font-family:inherit;font-size:13px;resize:vertical;min-height:80px}
    textarea.notes-input:focus{outline:none;border-color:#FF6022}
    .empty-state{text-align:center;padding:60px 20px;color:#52525B}
    .empty-state-icon{font-size:48px;margin-bottom:12px}
    @media(max-width:768px){.stats-bar{grid-template-columns:repeat(2,1fr)}.detail-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">H</div>
      <div><div class="header-title">Hello Park CRM</div></div>
    </div>
    <div><span class="dot-live"></span><span style="color:#71717A;font-size:12px">Онлайн</span></div>
  </div>
  <div class="stats-bar" id="stats-bar"></div>
  <div class="filters" id="filters"></div>
  <div class="table-wrap">
    <table><thead><tr><th>Клиент</th><th>Телефон</th><th>Мессенджер</th><th>Статус</th><th>Создано</th><th>Сумма</th></tr></thead>
    <tbody id="leads-table"></tbody></table>
  </div>
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header"><div class="modal-title" id="modal-title"></div><button class="modal-close" onclick="closeModal()">&times;</button></div>
      <div class="modal-body" id="modal-body"></div>
      <div class="action-row" id="modal-actions"></div>
    </div>
  </div>
<script src="/dashboard/app.js"></script>
</body>
</html>
